<!DOCTYPE html>
<html>
<head>
  <title>Vex Casino 🧿</title>
  <style>
    body {
      background: #0d0d0d;
      color: white;
      font-family: Arial;
      text-align: center;
      margin-top: 80px;
    }

    .box {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 15px;
      width: 300px;
      margin: auto;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .login { background: #5865F2; color: white; }
    .head { background: #4CAF50; }
    .tail { background: #2196F3; }
  </style>
</head>
<body>

<h1>🎰 Vex Casino</h1>

<div class="box">

  <p id="bal">Loading...</p>

  <button class="head" onclick="play('head')">Head</button>
  <button class="tail" onclick="play('tail')">Tail</button>

  <br><br>

  <button class="login" onclick="login()">Login met Discord</button>

</div>

<script>
const API = "https://repressed-yarn-vacant.ngrok-free.dev";

async function loadBal() {
  let res = await fetch(API + "/balance");
  let data = await res.json();

  if (data.error) {
    document.getElementById("bal").innerText = "❌ Niet ingelogd";
    return;
  }

  document.getElementById("bal").innerText =
    "💰 Balance: " + data.bal + " 🧿";
}

async function play(choice) {
  let res = await fetch(API + "/coinflip", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      choice: choice,
      bet: 100
    })
  });

  let data = await res.json();

  alert(data.msg);
  loadBal();
}

function login() {
  window.location.href = API + "/login";
}

loadBal();
</script>

</body>
</html>
