<!DOCTYPE html>
<html>
<head>
  <title>Vex Casino 🧿</title>
  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
    }

    button {
      padding: 15px 25px;
      margin: 10px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .head { background: #4CAF50; }
    .tail { background: #2196F3; }
  </style>
</head>
<body>

<h1>🎰 Vex Casino</h1>

<h2 id="bal">Loading...</h2>

<button class="head" onclick="play('head')">Head</button>
<button class="tail" onclick="play('tail')">Tail</button>

<script>
const API = "https://repressed-yarn-vacant.ngrok-free.dev";
let user = "player1";

async function loadBal() {
  let res = await fetch(API + "/balance/" + user);
  let data = await res.json();

  document.getElementById("bal").innerText =
    "💰 Balance: " + data.bal + " 🧿";
}

async function play(choice) {
  let res = await fetch(API + "/coinflip", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      user: user,
      choice: choice,
      bet: 100
    })
  });

  let data = await res.json();

  alert(data.msg);
  loadBal();
}

loadBal();
</script>

</body>
</html>
