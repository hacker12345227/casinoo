<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Vex Casino 🧿</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #1a1a1a, #000);
  color: white;
}

/* NAVBAR */
.nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  background: #111;
  padding: 15px;
}

.nav button {
  background: #222;
  color: white;
  border: none;
  padding: 10px 15px;
  border-radius: 10px;
  cursor: pointer;
}

.nav button:hover {
  background: #333;
}

/* SECTIONS */
.page {
  display: none;
  text-align: center;
  padding: 40px;
}

.active {
  display: block;
}

/* CARD */
.card {
  background: #1b1b1b;
  padding: 20px;
  border-radius: 15px;
  width: 350px;
  margin: auto;
  box-shadow: 0 0 20px #000;
}

/* BUTTONS */
.btn {
  padding: 12px 18px;
  margin: 8px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.login { background:#5865F2; color:white; }
.head { background:#4CAF50; color:white; }
.tail { background:#2196F3; color:white; }
.spin { background:#ff9800; color:black; }

/* ROULETTE WHEEL */
.wheel {
  margin: auto;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  border: 8px solid gold;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  background: conic-gradient(
    red 0 18%,
    black 18% 36%,
    red 36% 54%,
    black 54% 72%,
    red 72% 90%,
    green 90% 100%
  );
  transition: transform 3s ease;
}
</style>
</head>

<body>

<div class="nav">
  <button onclick="show('home')">🏠 Home</button>
  <button onclick="show('coinflip')">🪙 Coinflip</button>
  <button onclick="show('roulette')">🎰 Roulette</button>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <h1>🎰 Vex Casino</h1>
  <div class="card">
    <p id="bal">Loading...</p>
    <button class="login" onclick="login()">Login met Discord</button>
  </div>
</div>

<!-- COINFLIP -->
<div id="coinflip" class="page">
  <h1>🪙 Coinflip</h1>

  <div class="card">
    <p id="bal2"></p>

    <button class="head" onclick="coin('head')">Head</button>
    <button class="tail" onclick="coin('tail')">Tail</button>
  </div>
</div>

<!-- ROULETTE -->
<div id="roulette" class="page">
  <h1>🎰 Roulette</h1>

  <div class="card">

    <div id="wheel" class="wheel">SPIN</div>

    <br>

    <button class="spin" onclick="spin()">SPIN</button>

    <p id="result"></p>
  </div>
</div>

<script>

const API = "https://repressed-yarn-vacant.ngrok-free.dev";

let user = "player1";

/* NAV */
function show(page) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(page).classList.add("active");
}

/* BALANCE */
async function loadBal() {
  let res = await fetch(API + "/balance", {credentials:"include"});
  let data = await res.json();

  if (data.error) {
    document.getElementById("bal").innerText = "❌ Niet ingelogd";
    return;
  }

  document.getElementById("bal").innerText =
    "💰 Balance: " + data.bal + " 🧿";

  document.getElementById("bal2").innerText =
    "💰 Balance: " + data.bal + " 🧿";
}

/* LOGIN */
function login() {
  window.location.href = API + "/login";
}

/* COINFLIP */
async function coin(choice) {
  let res = await fetch(API + "/coinflip", {
    method:"POST",
    credentials:"include",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({choice, bet:100})
  });

  let data = await res.json();
  alert(data.msg);
  loadBal();
}

/* ROULETTE */
function spin() {
  let wheel = document.getElementById("wheel");

  let deg = Math.floor(Math.random()*3600);
  wheel.style.transform = "rotate(" + deg + "deg)";

  let result = ["red","black","red","black","red","green"];
  let pick = result[Math.floor(Math.random()*result.length)];

  setTimeout(() => {
    document.getElementById("result").innerText =
      "🎯 Result: " + pick.toUpperCase();
  }, 3000);
}

loadBal();

</script>

</body>
</html>
