<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Vex Casino 🧿</title>

  <style>
    body {
      background: radial-gradient(circle, #111, #000);
      color: white;
      font-family: Arial;
      text-align: center;
      margin-top: 70px;
    }

    .card {
      background: #1a1a1a;
      padding: 25px;
      border-radius: 16px;
      width: 340px;
      margin: auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }

    h1 {
      margin-bottom: 10px;
    }

    #bal {
      font-size: 20px;
      margin-bottom: 20px;
      color: #00ff99;
    }

    button {
      padding: 12px 18px;
      margin: 8px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    .login {
      background: #5865F2;
      color: white;
      width: 100%;
    }

    .head {
      background: #4CAF50;
      color: white;
    }

    .tail {
      background: #2196F3;
      color: white;
    }
  </style>
</head>

<body>

<h1>🎰 Vex Casino</h1>

<div class="card">

  <p id="bal">Loading...</p>

  <button class="head" onclick="play('head')">Head</button>
  <button class="tail" onclick="play('tail')">Tail</button>

  <br><br>

  <button class="login" onclick="login()">Login met Discord</button>

</div>

<script>

const API = "https://repressed-yarn-vacant.ngrok-free.dev";

// 🔑 token uit URL halen
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get("token");

let loggedIn = false;

// 💰 balance laden
async function loadBalance() {
  try {
    if (!token) {
      document.getElementById("bal").innerText = "❌ Niet ingelogd";
      return;
    }

    let res = await fetch(API + "/balance?token=" + token);
    let data = await res.json();

    if (data.error) {
      document.getElementById("bal").innerText = "❌ Login nodig";
      return;
    }

    loggedIn = true;

    document.getElementById("bal").innerText =
      "💰 Balance: " + data.bal + " 🧿";

  } catch (err) {
    document.getElementById("bal").innerText = "❌ Backend offline";
  }
}

// 🎲 coinflip
async function play(choice) {
  if (!token) {
    alert("Login eerst met Discord!");
    return;
  }

  let res = await fetch(API + "/coinflip?token=" + token, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      choice: choice,
      bet: 100
    })
  });

  let data = await res.json();

  alert(data.msg);

  loadBalance();
}

// 🔐 login
function login() {
  window.location.href = API + "/login";
}

// start
loadBalance();

</script>

</body>
</html>
