<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Vex Casino 🧿</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #1a1a1a, #000);
  color: white;
  text-align: center;
}

header {
  padding: 30px;
}

h1 {
  color: gold;
  font-size: 42px;
}

.card {
  width: 380px;
  margin: auto;
  background: #111;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 25px rgba(255,215,0,0.15);
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.login { background: #5865F2; color: white; }
.game { background: gold; color: black; }
.alt { background: #333; color: white; }

#roulette {
  font-size: 30px;
  margin: 10px 0;
}

.slider {
  width: 100%;
}

.small {
  font-size: 14px;
  color: #aaa;
}
</style>
</head>

<body>

<header>
  <h1>🎰 VEX CASINO</h1>
  <div class="small">Play smart. Win big.</div>
</header>

<div class="card">

  <div id="bal">⏳ Loading balance...</div>
  <div id="streak">🔥 Streak: 0</div>

  <div id="roulette">🎡</div>

  <input type="range" min="1" max="1000" value="100" id="bet">
  <div>Bet: <span id="betValue">100</span> 🧿</div>

  <button class="game" onclick="coinflip('head')">🪙 HEAD</button>
  <button class="game" onclick="coinflip('tail')">🪙 TAIL</button>

  <button class="alt" onclick="dice()">🎲 Dice</button>
  <button class="alt" onclick="highlow('high')">📈 High</button>
  <button class="alt" onclick="highlow('low')">📉 Low</button>
  <button class="alt" onclick="slot()">🎰 Slot</button>

  <button class="alt" onclick="shop()">🧿 Shop (x2 winst)</button>
  <button class="login" onclick="login()">Login Discord</button>

</div>

<audio id="win" src="https://www.soundjay.com/buttons/sounds/button-09.mp3"></audio>
<audio id="lose" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>

const API = "https://repressed-yarn-vacant.ngrok-free.dev";

const params = new URLSearchParams(window.location.search);
const token = params.get("token");

let streak = 0;
let multiplier = 1;

// ---------------- BET SLIDER ----------------
const bet = document.getElementById("bet");
const betValue = document.getElementById("betValue");

bet.oninput = () => betValue.innerText = bet.value;

// ---------------- BALANCE ----------------
async function loadBalance() {
  const el = document.getElementById("bal");

  if (!token) {
    el.innerText = "🔐 Login required";
    return;
  }

  try {
    let res = await fetch(API + "/balance?token=" + token);

    if (!res.ok) {
      el.innerText = "⚠️ Server error";
      return;
    }

    let data = await res.json();

    if (data.error) {
      el.innerText = "❌ Not logged in";
      return;
    }

    el.innerText = "💰 Balance: " + data.bal + " 🧿";

  } catch {
    el.innerText = "❌ API offline";
  }
}

// ---------------- ROULLETTE ANIM ----------------
function spinAnim() {
  const el = document.getElementById("roulette");
  let frames = ["🎡","🎰","🪙","💰","🎲"];

  let i = 0;
  let int = setInterval(() => {
    el.innerText = frames[i % frames.length];
    i++;
  }, 100);

  setTimeout(() => clearInterval(int), 1200);
}

// ---------------- COINFLIP ----------------
async function coinflip(choice) {
  spinAnim();

  let res = await fetch(API + "/coinflip?token=" + token, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      choice,
      bet: parseInt(bet.value) * multiplier
    })
  });

  let data = await res.json();

  if (data.msg.includes("WIN")) {
    streak++;
    document.getElementById("win").play();
  } else {
    streak = 0;
    document.getElementById("lose").play();
  }

  document.getElementById("streak").innerText = "🔥 Streak: " + streak;

  alert(data.msg);
  loadBalance();
}

// ---------------- DICE ----------------
function dice() {
  let roll = Math.floor(Math.random() * 6) + 1;

  alert("🎲 Rol: " + roll);

  if (roll >= 4) {
    document.getElementById("win").play();
    streak++;
  } else {
    document.getElementById("lose").play();
    streak = 0;
  }

  document.getElementById("streak").innerText = "🔥 Streak: " + streak;
}

// ---------------- HIGH LOW ----------------
function highlow(type) {
  let n = Math.floor(Math.random() * 100);

  let win = (type === "high" && n > 50) || (type === "low" && n <= 50);

  alert("🎯 Nummer: " + n);

  if (win) {
    document.getElementById("win").play();
    streak++;
  } else {
    document.getElementById("lose").play();
    streak = 0;
  }

  document.getElementById("streak").innerText = "🔥 Streak: " + streak;
}

// ---------------- SLOT ----------------
function slot() {
  const s = ["🍒","🍋","💎","7️⃣","🍀"];

  let a = s[Math.floor(Math.random()*s.length)];
  let b = s[Math.floor(Math.random()*s.length)];
  let c = s[Math.floor(Math.random()*s.length)];

  alert("🎰 " + a + " | " + b + " | " + c);

  if (a === b && b === c) {
    document.getElementById("win").play();
    streak += 3;
  } else {
    document.getElementById("lose").play();
    streak = 0;
  }

  document.getElementById("streak").innerText = "🔥 Streak: " + streak;
}

// ---------------- SHOP ----------------
function shop() {
  if (streak >= 5) {
    multiplier = 2;
    alert("🧿 x2 multiplier unlocked!");
  } else {
    alert("❌ 5 streak nodig");
  }
}

// ---------------- LOGIN ----------------
function login() {
  window.location.href = API + "/login";
}

// start
loadBalance();

</script>

</body>
</html>
