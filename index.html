<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Vex Casino 🧿</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
  text-align: center;
}

.box {
  width: 340px;
  margin: 60px auto;
  background: #151515;
  padding: 20px;
  border-radius: 12px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.login { background: #5865F2; color: white; }
.game { background: gold; color: black; }

#bal {
  font-size: 18px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="box">

  <h2>🎰 VEX CASINO</h2>

  <div id="bal">Loading...</div>

  <button class="game" onclick="coinflip('head')">🪙 HEAD</button>
  <button class="game" onclick="coinflip('tail')">🪙 TAIL</button>

  <button class="login" onclick="login()">Login Discord</button>

</div>

<script>

const API = "https://repressed-yarn-vacant.ngrok-free.dev";

const params = new URLSearchParams(window.location.search);
const token = params.get("token");

console.log("TOKEN:", token);

// ---------------- LOGIN ----------------
function login() {
  window.location.href = API + "/login";
}

// ---------------- BALANCE ----------------
async function loadBalance() {
  const el = document.getElementById("bal");

  if (!token) {
    el.innerHTML = "❌ Niet ingelogd";
    return;
  }

  try {
    const res = await fetch(API + "/balance?token=" + token);
    const data = await res.json();

    console.log("BAL:", data);

    if (data.error) {
      el.innerText = "❌ Session invalid";
      return;
    }

    el.innerText = "💰 Balance: " + data.bal + " 🧿";

  } catch (err) {
    console.log(err);
    el.innerText = "⚠️ Server niet bereikbaar";
  }
}

// ---------------- COINFLIP ----------------
async function coinflip(choice) {

  if (!token) {
    alert("Login eerst!");
    return;
  }

  try {
    const res = await fetch(API + "/coinflip?token=" + token, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        choice: choice,
        bet: 100
      })
    });

    const data = await res.json();

    console.log("GAME:", data);

    alert(data.msg);

    loadBalance();

  } catch (err) {
    console.log(err);
    alert("API error");
  }
}

// START
loadBalance();

</script>

</body>
</html>
